name: CI — Quality Gate Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Audit good fixture
        run: npm run audit:good

      - name: Audit bad fixture
        run: npm run audit:bad || true

      - name: Score good fixture
        run: npm run score:good

      - name: Score bad fixture
        run: npm run score:bad || true

      - name: Generate good report
        run: npm run report:good

      - name: Generate bad report
        run: npm run report:bad || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports-node-${{ matrix.node-version }}
          path: examples/audit-report-*.md
          retention-days: 30
