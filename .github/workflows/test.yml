name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run test suite (35 tests)
        run: npm test

      - name: Self-audit (score >= 90)
        run: node scripts/skillqa.mjs score . --json --fail-under 90

      - name: Self-audit report
        run: npm run report:self

      - name: Strict mode rejects bad fixture (expected exit 2)
        run: |
          node scripts/skillqa.mjs audit scripts/fixtures/bad-skill --strict && exit 1 || test $? -eq 2

      - name: Generate reports
        run: |
          npm run report:good
          npm run report:bad

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports-node${{ matrix.node-version }}
          path: examples/*.md
