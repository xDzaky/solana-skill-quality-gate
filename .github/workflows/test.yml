name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run test suite (50 tests)
        run: npm test

      - name: Self-audit gate (score >= 90)
        run: npm run gate

      - name: Batch review benchmark fixtures (JSON)
        run: node scripts/skillqa.mjs batch scripts/fixtures/benchmark-samples --json --out examples/batch-review.json

      - name: Batch review benchmark fixtures (Markdown)
        run: node scripts/skillqa.mjs batch scripts/fixtures/benchmark-samples --markdown --out examples/batch-review.md

      - name: SARIF report for bad fixture
        run: node scripts/skillqa.mjs report scripts/fixtures/bad-skill --sarif --out examples/bad-skill.sarif

      - name: Strict mode rejects bad fixture (expected exit 2)
        run: |
          node scripts/skillqa.mjs audit scripts/fixtures/bad-skill --strict && exit 1 || test $? -eq 2

      - name: Generate reports
        run: |
          npm run report:good
          npm run report:bad
          npm run report:self

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports-node${{ matrix.node-version }}
          path: |
            examples/*.md
            examples/*.json
            examples/*.sarif
